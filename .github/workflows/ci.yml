name: CI

on: [push]

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/install

      - run: pnpm oxlint

      - run: pnpm oxfmt --check

      - run: pnpm tsc --noEmit

      - run: pnpm knip
